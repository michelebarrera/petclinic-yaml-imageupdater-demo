apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: petclinic-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
        - name: petclinic
          image: michelebarrera/petclinic-imageupdater-demo:1.0.0
          ports:
            - containerPort: 8080
