apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/michelebarrera/petclinic-yaml-imageupdater-demo.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic
  syncPolicy:
    syncOptions:
      - CreateNamespace=true