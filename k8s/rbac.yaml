apiVersion: v1
kind: ServiceAccount
metadata:
  name: petclinic-sa
  namespace: petclinic
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: petclinic-read-role
  namespace: petclinic
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: petclinic-read-binding
  namespace: petclinic
subjects:
  - kind: ServiceAccount
    name: petclinic-sa
    namespace: petclinic
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: petclinic-read-role