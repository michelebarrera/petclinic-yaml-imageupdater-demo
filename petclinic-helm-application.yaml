apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic-helm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/michelebarrera/petclinic-yaml-imageupdater-demo.git
    targetRevision: main
    path: helm/petclinic
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic-helm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
